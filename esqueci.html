<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha</title>
    <link rel="stylesheet" href="style.css">
    <!-- Script oficial para o e-mail funcionar -->
    <script type="text/javascript" src="https://jsdelivr.net"></script>
</head>
<body>

    <nav>
        <div class="logo">MeuSite</div>
        <ul><li><a href="index.html">Início</a></li></ul>
    </nav>

    <div class="container">
        <div class="box">
            <h2>Recuperar Senha</h2>
            <p style="margin-bottom: 15px; font-size: 14px;">Enviaremos um código de 6 dígitos para o seu e-mail.</p>
            
            <form id="forgotForm">
                <input type="email" id="recoveryEmail" placeholder="Seu e-mail" required>
                <button type="submit" id="btn-enviar">Enviar Código Real</button>
                <p><a href="index.html">Cancelar e Voltar</a></p>
            </form>
        </div>
    </div>

    <script type="text/javascript">
        // Inicializa o EmailJS com a sua chave
        (function() {
            emailjs.init("gVenqLFfY44rkEvoD"); 
        })();

        document.getElementById('forgotForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const btn = document.getElementById('btn-enviar');
            btn.innerText = 'Enviando...';
            btn.disabled = true;

            const emailUsuario = document.getElementById('recoveryEmail').value;

            // Gera o código aleatório de 6 dígitos
            const codigoAleatorio = Math.floor(100000 + Math.random() * 900000);

            // Dados que vão para o seu template de OTP
            const templateParams = {
                email: emailUsuario,      
                passcode: codigoAleatorio, 
                time: "15 minutos"        
            };

            // Envia o e-mail usando seus IDs configurados
            emailjs.send('service_h7q73vm', 'template_blpsyni', templateParams)
                .then(function() {
                    alert('SUCESSO! O código ' + codigoAleatorio + ' foi enviado para ' + emailUsuario);
                    window.location.href = "index.html";
                }, function(error) {
                    alert('Erro ao enviar. Verifique se o serviço de e-mail está ativo no site do EmailJS.');
                    btn.innerText = 'Enviar Código Real';
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
