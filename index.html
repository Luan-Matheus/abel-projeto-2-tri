<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login Profissional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">MeuSite</div>
        <ul>
            <li><a href="index.html">Home</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="box">
            <h2>Login</h2>
            <div id="error" class="error-msg">Nome ou senha incorretos!</div>
            
            <form id="loginForm">
                <input type="text" id="user" placeholder="Nome de usuário" required>
                <input type="password" id="pass" placeholder="Senha" required>
                
                <!-- ESTE LINK ABRE O ARQUIVO esqueci.html -->
                <a href="esqueci.html" class="link">Esqueci minha senha</a>
                
                <button type="submit">Entrar</button>
                
                <!-- ESTE LINK ABRE O ARQUIVO cadastro.html -->
                <p>Não tem conta? <a href="cadastro.html">Cadastre-se aqui</a></p>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "admin" && p === "123") {
                alert("Login realizado!");
            } else {
                document.getElementById('error').style.display = "block";
            }
        }
    </script>
</body>
</html>
