<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Página de Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">MeuSite</div>
        <ul><li><a href="index.html">Início</a></li></ul>
    </nav>

    <div class="container">
        <div class="box">
            <h2>Login</h2>
            <div id="error" class="error-msg">Nome ou senha incorretos!</div>
            <form id="loginForm">
                <input type="text" id="user" placeholder="Usuário (admin)" required>
                <input type="password" id="pass" placeholder="Senha (123)" required>
                
                <!-- PORTA PARA O ESQUECI SENHA -->
                <a href="esqueci.html" class="link">Esqueci minha senha</a>
                
                <button type="submit">Entrar</button>
                
                <!-- PORTA PARA O CADASTRO -->
                <p>Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "admin" && p === "123") {
                alert("Login realizado com sucesso!");
            } else {
                document.getElementById('error').style.display = "block";
            }
        }
    </script>
</body>
</html>
